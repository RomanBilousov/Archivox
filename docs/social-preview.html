<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Archivox Social Preview</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #efe9dd;
        --paper-strong: #fbf8f1;
        --ink: #181613;
        --muted: #72695c;
        --line: rgba(24, 22, 19, 0.08);
        --accent: #1e5a45;
        --accent-soft: rgba(30, 90, 69, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1280px;
        height: 640px;
        overflow: hidden;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(80, 132, 111, 0.14), transparent 34%),
          radial-gradient(circle at bottom right, rgba(184, 161, 122, 0.16), transparent 30%),
          var(--paper);
      }

      .canvas {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 54px;
      }

      .frame {
        position: relative;
        display: grid;
        grid-template-columns: 1.04fr 1fr;
        gap: 28px;
        width: 100%;
        height: 100%;
        padding: 42px;
        border: 1px solid var(--line);
        border-radius: 34px;
        background: rgba(251, 248, 241, 0.76);
        box-shadow: 0 30px 80px rgba(55, 45, 34, 0.12);
        backdrop-filter: blur(10px);
      }

      .copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 18px;
        padding: 6px 4px 6px 8px;
      }

      .eyebrow {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: var(--ink);
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        font-size: 72px;
        line-height: 0.92;
        letter-spacing: -0.05em;
      }

      .lede {
        margin: 0;
        max-width: 500px;
        color: var(--muted);
        font-size: 26px;
        line-height: 1.35;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 8px;
      }

      .pill {
        padding: 10px 16px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 16px;
        font-weight: 600;
      }

      .shot-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .shot-wrap::before {
        content: "";
        position: absolute;
        inset: 28px 18px 8px 58px;
        border-radius: 36px;
        background: linear-gradient(180deg, rgba(30, 90, 69, 0.24), rgba(30, 90, 69, 0.06));
        filter: blur(30px);
      }

      .shot {
        position: relative;
        width: 100%;
        border-radius: 26px;
        border: 1px solid rgba(24, 22, 19, 0.08);
        box-shadow: 0 20px 50px rgba(40, 31, 22, 0.14);
      }

      .mark {
        position: absolute;
        left: 42px;
        bottom: 34px;
        color: rgba(24, 22, 19, 0.38);
        font-size: 16px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <section class="frame">
        <div class="copy">
          <p class="eyebrow">Archivox</p>
          <h1>Transcription for long-form archives.</h1>
          <p class="lede">
            Local-first workflow for private media folders, internal trainings,
            and overnight batch runs.
          </p>
          <div class="pill-row">
            <span class="pill">Folder in</span>
            <span class="pill">Transcript out</span>
            <span class="pill">No cloud upload</span>
          </div>
        </div>
        <div class="shot-wrap">
          <img class="shot" src="assets/app-screenshot.png" alt="Archivox app screenshot" />
        </div>
      </section>
      <div class="mark">local-first transcription</div>
    </div>
  </body>
</html>
